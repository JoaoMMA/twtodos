{% extends 'todos/base.html' %}

{% block title%}Deletar tarefa{% endblock title%}

{% block content %}
<h1>Deletar tarefa?</h1>

<p>Você deseja deletar a tarefa<strong>{{ todo.id }}: {{ todo.title }}?</strong></p>

<form method="POST">
    {% csrf_token %}

    <button type="submit" class="btn btn-danger mb-2 btn-sm">Excluir</button>
    <a href="{% url "todo_list" %}" class="btn btn-primary mb-2 btn-sm">Cancelar</a>
</form>


{% endblock content %}
